<!DOCTYPE html>
<html lang="az">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Sura Axundova</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;

    background:#0f172a;
}

body{

    min-height:100vh;
    min-height:100dvh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:
    env(safe-area-inset-top)
    20px
    env(safe-area-inset-bottom)
    20px;

    background:
    linear-gradient(135deg,#0f172a,#1e293b,#111827);

    position:relative;

    -webkit-tap-highlight-color:transparent;
}

/* Glow blur dairələr */

.bg{

    position:absolute;

    border-radius:50%;

    filter:blur(80px);

    opacity:0.5;

    animation:move 12s infinite alternate ease-in-out;
}

.bg1{

    width:300px;
    height:300px;

    background:#7c3aed;

    top:-50px;
    left:-50px;
}

.bg2{

    width:250px;
    height:250px;

    background:#06b6d4;

    bottom:-50px;
    right:-50px;

    animation-duration:15s;
}

@keyframes move{

    0%{
        transform:translate(0,0);
    }

    100%{
        transform:translate(50px,-40px);
    }
}

/* Kart */

.card{

    width:100%;
    max-width:360px;

    padding:40px 25px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.15);

    text-align:center;

    box-shadow:0 10px 40px rgba(0,0,0,0.4);

    z-index:10;
}

/* Şəkil */

.image-box{

    width:170px;
    height:170px;

    margin:auto;
    margin-bottom:25px;

    position:relative;

    animation:
    floatY 5s ease-in-out infinite,
    floatX 7s ease-in-out infinite;
}

.image-box img{

    width:100%;
    height:100%;

    object-fit:cover;

    border-radius:50%;

    border:4px solid white;

    box-shadow:
    0 0 30px rgba(255,255,255,0.3),
    0 0 60px rgba(124,58,237,0.5);
}

/* Yuxarı aşağı */

@keyframes floatY{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-18px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* Sağa sola */

@keyframes floatX{

    0%{
        left:-10px;
    }

    50%{
        left:10px;
    }

    100%{
        left:-10px;
    }
}

/* Typing text */

.typing-text{

    font-weight:600;

    font-size:clamp(20px,5vw,25px);

    max-width:100%;

    color:#d1d5db;

    height:35px;

    letter-spacing:2px;

    white-space:nowrap;

    overflow:hidden;

    margin:auto;

    width:max-content;

    text-shadow:
    0 0 15px rgba(255,255,255,0.4),
    0 0 30px rgba(124,58,237,0.6);

    position:relative;
}

/* Cursor */

.typing-text::after{

    content:"";

    display:inline-block;

    width:3px;

    height:28px;

    background:white;

    margin-left:6px;

    animation:blink .7s infinite;

    vertical-align:middle;

    border-radius:999px;
}

/* Cursor blink */

@keyframes blink{

    0%{
        opacity:1;
    }

    50%{
        opacity:0;
    }

    100%{
        opacity:1;
    }
}

/* Linklər */

.links{

    margin-top:35px;

    display:flex;
    flex-direction:column;

    gap:15px;
}

.links a{

    text-decoration:none;

    color:white;

    background:rgba(255,255,255,0.1);

    padding:15px;

    border-radius:14px;

    transition:0.3s;

    font-weight:bold;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:12px;

    font-size:17px;
}

/* Hover */

.links a:hover{

    background:white;

    color:#111827;

    transform:
    scale(1.05)
    translateY(-3px);

    box-shadow:
    0 0 20px rgba(255,255,255,0.3),
    0 0 40px rgba(124,58,237,0.5);
}

/* Hover icon rəngləri */

.links a:hover .fa-instagram{
    color:#e1306c;
}

.links a:hover .fa-tiktok{
    color:#111827;
}

.links a:hover .fa-youtube{
    color:#ff0000;
}

.links a:hover .fa-whatsapp{
    color:#25d366;
}

/* Normal icon rəngləri */

.fa-instagram{
    color:#ff4fd8;
}

.fa-tiktok{
    color:white;
}

.fa-youtube{
    color:#ff3131;
}

.fa-whatsapp{
    color:#25d366;
}

/* Responsive */

@media (max-width:480px){

    .card{
        padding:35px 20px;
    }

    .image-box{
        width:145px;
        height:145px;
    }

    .links a{
        padding:14px;
        font-size:16px;
    }

    .typing-text{
        letter-spacing:1px;
    }

    .bg1{
        width:220px;
        height:220px;
    }

    .bg2{
        width:180px;
        height:180px;
    }
}

</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="card">

    <!-- Şəkil -->

    <div class="image-box">

        <img src="muellime.jpeg" alt="">

    </div>

    <!-- Yazı -->

    <div class="typing-text" id="typing"></div>

    <!-- Sosial media -->

    <div class="links">

        <a href="https://www.instagram.com/fizikahazirliq_1?igsh=YXZha2dxdmEyc2U2" target="_blank">

            <i class="fa-brands fa-instagram"></i>

            Instagram

        </a>

        <a href="https://www.tiktok.com/@fizikahazirliq_1?_r=1&_t=ZS-96i47aNTTv7" target="_blank">

            <i class="fa-brands fa-tiktok"></i>

            TikTok

        </a>

        <a href="https://youtube.com/@fizikahazirliq_1?si=w3mKICmaqaq1dwpV" target="_blank">

            <i class="fa-brands fa-youtube"></i>

            YouTube

        </a>

        <a href="whatsapp://send?phone=994552716407">

            <i class="fa-brands fa-whatsapp"></i>

            WhatsApp

        </a>

    </div>

</div>

<script>

const texts = [

    "Fizika Müəlliməsi",
    "Sura Axundova"

];

let speed = 100;

let textIndex = 0;

let charIndex = 0;

const typing = document.getElementById("typing");

function type(){

    if(charIndex < texts[textIndex].length){

        typing.innerHTML += texts[textIndex].charAt(charIndex);

        charIndex++;

        setTimeout(type,speed);

    }

    else{

        setTimeout(erase,2000);
    }
}

function erase(){

    if(charIndex > 0){

        typing.innerHTML =
        texts[textIndex].substring(0,charIndex - 1);

        charIndex--;

        setTimeout(erase,50);
    }

    else{

        textIndex++;

        if(textIndex >= texts.length){

            textIndex = 0;
        }

        setTimeout(type,500);
    }
}

window.onload = type;

</script>

</body>
</html>
